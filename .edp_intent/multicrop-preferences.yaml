# ACCEPTANCE CRITERIA
# ─────────────────────────────────────────────────────────────────────────────

acceptanceCriteria:
  # Feature 1
  - id: "AC-F1-001"
    description: "Preferred crop gets boost in ILP"
    given: "Farm with preferred_crop_ids=[0] (Tomato) and gap_vector showing Tomato needed"
    when: "POST /optimize"
    then: "Farm is assigned Tomato at higher rate than without preference"

  - id: "AC-F1-002"
    description: "preference_match=true when assigned crop is preferred"
    given: "Farm prefers Tomato, engine assigns Tomato"
    when: "POST /nodes or GET /nodes/{id}"
    then: "preference_match=true in response"

  - id: "AC-F1-003"
