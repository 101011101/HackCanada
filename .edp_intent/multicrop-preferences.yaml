nonGoals:
  - "Changing the ILP formulation or integrality constraints"
  - "Hard preference constraints (must-assign-preferred)"
  - "UI or frontend changes"
  - "app/engine/data.py changes"
  - "app/engine/main.py changes"
  - "Fractional sqft allocation in the ILP"
  - "Variable slot size (non-equal sqft split)"
  - "Capping maximum number of crops per farm (let min_slot_sqft handle it)"

complexityBudget:
