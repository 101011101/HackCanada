  - name: "compute_multi_crop_assignments"
    type: "new function in optimizer.py"
    returns: "list[list[int]]"

  - name: "greedy_insert"
    change: "MODIFIED signature — add preferred_crop_ids: list[int] = [] param"
    returns: "int (unchanged)"

